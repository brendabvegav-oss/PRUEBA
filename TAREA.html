<script>

/*linea que permite escribir*/
document.write('Hola');
document.write('<br>');

document.write('Este es mi primer programa con javascript en este curso');
document.write('<br>');
document.write('<br>');
document.write('Hagamos operaciones');
document.write('<br>');
document.write('<br>');

/*creo variables*/
var baserectangulo;
var alturarectangulo;
var ladopentagono;

/*pido datos en un dialogo del explorador*/
baserectangulo = prompt('Dame la base del rectangulo: ','');
alturarectangulo = prompt('Dame la altura del rectangulo: ','');
ladopentagono = prompt('Dame el lado del pentagono: ','');

/*convierto valores a numericos*/
baserectangulo = parseInt(baserectangulo);
alturarectangulo = parseInt(alturarectangulo);
ladopentagono = parseInt(ladopentagono);

/*hago operaciones*/
//calculo del perimetro del rectangulo
var perimetrorectangulo = 2 * (baserectangulo + alturarectangulo);

//calculo del perimetro del pentagono
var perimetropentagono = 5 * ladopentagono;

/*escribo resultados*/
document.write('El perimetro del rectangulo es: ');
document.write(perimetrorectangulo);
document.write('<br>');
document.write('<br>');

document.write('El perimetro del pentagono es: ');
document.write(perimetropentagono);

</script>
